[package]
name = "esp-csi-rs"
version = "0.3.0"
edition = "2021"
authors = ["Omar Hiari"]
description = "ESP CSI Driver for Rust"
keywords = ["embedded", "esp32", "wifi", "csi"]
categories = ["embedded"]
readme = "README.md"
homepage = "https://blog.theembeddedrustacean.com/"
repository = "https://github.com/theembeddedrustacean/esp-csi-rs"
license = "MIT OR Apache-2.0"
exclude = ["target/debug/*", "assets/*"]

[lib]
path = "src/lib/lib.rs"

[features]
#! ⚠️ At minimum you are required to choose only ONE of the device options. For the most efficient (and fastest) logging, you should combine defmt with the jtag-serial features.

default = ["no-std", "println", "auto"]
## Build without the standard library.
no-std = []
## Enable logging via defmt.
defmt = [
    "dep:defmt",
    "dep:defmt-rtt",
    "esp-hal/defmt",
    "esp-radio/defmt",
    "esp-backtrace/defmt",
    "embassy-executor/defmt",
    "esp-println/defmt-espflash",
]
## Enable logging via `println!()` instead of defmt.
println = ["esp-backtrace/println"]
## Enable the JTAG serial interface for logging. Only supported by ESP32-C3, ESP32-C6, and ESP32-S3.
jtag-serial = ["esp-println/jtag-serial"] # C3, C6, H2, P4, and S3 only!
## Automaically select the logging interface based on the target (Ex. UART).
auto = ["esp-println/auto"]
## Enable the UART interface for logging
uart = ["esp-println/uart"]

## Support for the ESP32
# esp32 = [
#     "esp-backtrace/esp32",
#     "esp-hal/esp32",
#     "esp-hal/rt",
#     "esp-println/esp32",
#     "esp-bootloader-esp-idf/esp32",
#     "esp-println/critical-section",
#     "esp-wifi/esp32",
#     "esp-wifi/csi",
#     "esp-wifi/sniffer",
# ]

# ## Support for the ESP32-C2
# esp32c2 = [
#     "esp-backtrace/esp32c2",
#     "esp-bootloader-esp-idf/esp32c2",
#     "esp-backtrace/println",
#     "esp-hal/esp32c2",
#     "esp-hal/rt",
#     "esp-println/esp32c2",
#     "esp-println/critical-section",
#     "esp-wifi/esp32c2",
#     "esp-wifi/csi",
#     "esp-wifi/sniffer",
# ]

# ## Support for the ESP32-C3
esp32c3 = [
        # "esp-hal/esp32c3",
        # "esp-hal/rt",
        # "esp-backtrace/esp32c3",
        # "esp-radio/esp32c3",
        # "esp-bootloader-esp-idf/esp32c3",
        # "esp-radio/csi",
        # "esp-radio/sniffer",
        # "esp-println/esp32c3",
]

# ## Support for the ESP32-C6 (WiFi 6)
# esp32c6 = [
#     "esp-hal/esp32c6",
#     "esp-hal/rt",
#     "esp-backtrace/esp32c6",
#     "esp-wifi/esp32c6",
#     "esp-bootloader-esp-idf/esp32c6",
#     "esp-wifi/csi",
#     "esp-wifi/sniffer",
#     "esp-println/esp32c6",
#     "esp-println/critical-section",
# ]

# ## Support for the ESP32-S3 (AIoT)
# esp32s3 = [
#     "esp-hal/esp32s3",
#     "esp-hal/rt",
#     "esp-backtrace/esp32s3",
#     "esp-wifi/esp32s3",
#     "esp-bootloader-esp-idf/esp32s3",
#     "esp-wifi/csi",
#     "esp-wifi/sniffer",
#     "esp-println/esp32s3",
#     "esp-println/critical-section",
